<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cold Hallway Films</title>
  <meta name="description" content="Cold Hallway Films. Home of The Technician." />
  <style>
    *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:#000;color:#e9edf0;font-family:Inter,Arial,Helvetica,sans-serif}.splash{height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle at 50% 42%,rgba(72,102,115,.18),transparent 38%),#000}.splash:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,transparent 48%,rgba(0,0,0,.84) 100%);pointer-events:none}.logo-link{display:block;position:relative;z-index:2;width:min(86vw,1080px);cursor:pointer;transition:transform .6s ease,filter .6s ease}.logo-link:hover{transform:scale(1.015);filter:brightness(1.18)}.logo-link img{display:block;width:100%;height:auto;max-height:78vh;object-fit:contain}.enter{position:absolute;left:0;right:0;bottom:34px;text-align:center;z-index:3;font-size:12px;letter-spacing:.55em;text-transform:uppercase;color:rgba(233,237,240,.72);pointer-events:none}.hint{position:absolute;left:0;right:0;bottom:15px;text-align:center;z-index:3;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(233,237,240,.32);pointer-events:none}@media(max-width:700px){.logo-link{width:94vw}.enter{bottom:28px;font-size:11px;letter-spacing:.42em}.hint{display:none}}
  </style>
</head>
<body>
  <main class="splash" aria-label="Cold Hallway Films landing page">
    <a class="logo-link" href="the-technician.html" aria-label="Enter Cold Hallway Films">
      <img src="assets/coldhallway-logo.jpeg" alt="Cold Hallway Films logo" />
    </a>
    <div class="enter">ENTER</div>
    <div class="hint">click the logo</div>
  </main>
</body>
</html>
