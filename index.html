<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cold Hallway Films</title>
  <meta name="description" content="Cold Hallway Films. Home of The Technician." />
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden;background:#000;color:#eef3f5;font-family:Inter,Arial,Helvetica,sans-serif}
    body{cursor:default}

    /* SPLASH */
    .splash{height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle at 50% 42%,rgba(72,102,115,.18),transparent 38%),#000;transition:opacity .45s ease,filter .45s ease}
    .splash:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,transparent 48%,rgba(0,0,0,.88) 100%);pointer-events:none;z-index:1}
    .logo-link{display:block;position:relative;z-index:2;width:min(86vw,1080px);cursor:pointer;transition:transform .6s ease,filter .6s ease}
    .logo-link:hover{transform:scale(1.012);filter:brightness(1.2) contrast(1.05)}
    .logo-link img{display:block;width:100%;height:auto;max-height:78vh;object-fit:contain;filter:drop-shadow(0 0 18px rgba(120,180,200,.10))}
    .enter{position:absolute;left:0;right:0;bottom:34px;text-align:center;z-index:3;font-size:12px;letter-spacing:.55em;text-transform:uppercase;color:rgba(233,237,240,.72);pointer-events:none}
    .hint{position:absolute;left:0;right:0;bottom:15px;text-align:center;z-index:3;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(233,237,240,.32);pointer-events:none}

    /* IDENT OVERLAY */
    .ident{position:fixed;inset:0;background:#000;z-index:20;opacity:0;pointer-events:none;overflow:hidden}
    body.playing .splash{opacity:0;filter:brightness(0)}
    body.playing .ident{opacity:1;pointer-events:auto;animation:identEnd 8.4s linear forwards}

    .blackout{position:absolute;inset:0;background:#000;z-index:20;opacity:1;animation:blackout 8.4s linear forwards}
    .hallway{position:absolute;inset:0;overflow:hidden;background:linear-gradient(90deg,#071015 0%,#111d21 18%,#18262a 50%,#111d21 82%,#071015 100%);filter:brightness(.25);animation:hallLight 8.4s steps(1,end) forwards}
    .hallway:before{content:"";position:absolute;inset:-10%;background:radial-gradient(circle at 50% 8%,rgba(150,230,245,.38),transparent 10%),radial-gradient(circle at 50% 36%,rgba(130,210,230,.18),transparent 20%),radial-gradient(circle at 50% 100%,rgba(140,230,255,.12),transparent 38%);opacity:.62;animation:fluoroFlicker 8.4s steps(1,end) forwards}
    .hallway:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,transparent 22%,rgba(0,0,0,.78) 80%,#000 100%),linear-gradient(0deg,rgba(0,0,0,.72),transparent 25%,transparent 70%,rgba(0,0,0,.58));z-index:5}

    .ceiling{position:absolute;left:12%;right:12%;top:0;height:54%;clip-path:polygon(37% 0,63% 0,72% 100%,28% 100%);background:repeating-linear-gradient(90deg,rgba(255,255,255,.055) 0 1px,transparent 1px 90px),linear-gradient(#1b292d,#071013);opacity:.75;transform-origin:top center;perspective:600px}
    .floor{position:absolute;left:0;right:0;bottom:0;height:48%;background:linear-gradient(180deg,rgba(30,58,64,.45),rgba(0,0,0,.96)),repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 2px,transparent 2px 120px);clip-path:polygon(27% 0,73% 0,100% 100%,0 100%)}
    .wall.left,.wall.right{position:absolute;top:0;bottom:0;width:44%;background:linear-gradient(90deg,#071013,#142126 50%,#071013);opacity:.78}
    .wall.left{left:0;clip-path:polygon(0 0,72% 0,57% 100%,0 100%)}
    .wall.right{right:0;clip-path:polygon(28% 0,100% 0,100% 100%,43% 100%)}
    .doors{position:absolute;inset:0;z-index:2;background:
      linear-gradient(90deg,transparent 9%,rgba(255,255,255,.08) 9.2%,transparent 9.5%),
      linear-gradient(90deg,transparent 19%,rgba(255,255,255,.08) 19.2%,transparent 19.5%),
      linear-gradient(90deg,transparent 31%,rgba(255,255,255,.08) 31.2%,transparent 31.5%),
      linear-gradient(90deg,transparent 69%,rgba(255,255,255,.08) 69.2%,transparent 69.5%),
      linear-gradient(90deg,transparent 81%,rgba(255,255,255,.08) 81.2%,transparent 81.5%),
      linear-gradient(90deg,transparent 91%,rgba(255,255,255,.08) 91.2%,transparent 91.5%);opacity:.5}
    .lights{position:absolute;left:50%;top:2%;width:15vw;height:48vh;transform:translateX(-50%);z-index:3;background:repeating-linear-gradient(180deg,rgba(200,250,255,.0) 0 42px,rgba(190,245,255,.95) 42px 48px,rgba(200,250,255,.0) 48px 88px);filter:blur(.4px) drop-shadow(0 0 18px rgba(165,235,255,.75));opacity:.1;animation:lightStrip 8.4s steps(1,end) forwards}
    .vanish{position:absolute;left:50%;top:47%;width:5px;height:5px;background:rgba(220,250,255,.8);border-radius:50%;box-shadow:0 0 60px 32px rgba(120,210,230,.18);z-index:1}

    .tech{position:absolute;left:50%;bottom:13%;width:80px;height:185px;transform:translateX(-50%) scale(.18);transform-origin:bottom center;z-index:8;filter:drop-shadow(0 24px 18px rgba(0,0,0,.7));opacity:0;animation:techMove 8.4s cubic-bezier(.2,.02,.08,1) forwards}
    .head{position:absolute;left:28px;top:0;width:26px;height:32px;border-radius:50% 50% 45% 45%;background:#010405}
    .body{position:absolute;left:18px;top:34px;width:45px;height:82px;background:#010405;clip-path:polygon(16% 0,84% 0,100% 100%,0 100%)}
    .arm{position:absolute;top:70px;width:32px;height:12px;background:#010405;border-radius:8px}.arm.l{left:-2px;transform:rotate(16deg)}.arm.r{right:-2px;transform:rotate(-16deg)}
    .leg{position:absolute;top:112px;width:16px;height:62px;background:#010405;border-radius:9px}.leg.l{left:23px}.leg.r{right:23px}
    .cart{position:absolute;left:-10px;top:86px;width:100px;height:78px;background:linear-gradient(#020607,#000);border:1px solid rgba(180,230,240,.15);box-shadow:0 0 18px rgba(125,220,240,.05)}
    .cart:before{content:"";position:absolute;left:8px;right:8px;top:18px;height:1px;background:rgba(210,245,255,.12);box-shadow:0 18px 0 rgba(210,245,255,.1),0 36px 0 rgba(210,245,255,.08)}
    .wheel{position:absolute;bottom:-13px;width:15px;height:15px;border-radius:50%;background:#000;border:2px solid rgba(170,220,230,.18)}.wheel.l{left:10px}.wheel.r{right:10px}

    .speedlines{position:absolute;inset:0;z-index:7;opacity:0;background:repeating-radial-gradient(ellipse at center,transparent 0 16px,rgba(190,245,255,.055) 18px 20px);filter:blur(1px);animation:speed 8.4s linear forwards}
    .caption{position:absolute;left:5vw;bottom:7vh;z-index:30;color:rgba(238,243,245,.86);font-size:clamp(13px,1.6vw,21px);letter-spacing:.08em;text-transform:uppercase;line-height:1.55;text-shadow:0 0 12px #000;opacity:0;animation:captions 8.4s linear forwards}
    .brandReveal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:31;opacity:0;animation:brand 8.4s linear forwards;background:#000}
    .brandReveal img{width:min(78vw,840px);height:auto;filter:brightness(1.18) contrast(1.08) drop-shadow(0 0 24px rgba(170,230,240,.18))}
    .buzzLine{width:min(56vw,620px);height:2px;margin-top:-2vh;background:linear-gradient(90deg,transparent,rgba(195,245,255,.9),transparent);box-shadow:0 0 14px rgba(175,235,255,.8);opacity:.85;animation:buzzLine 1.2s steps(1,end) infinite}

    @keyframes blackout{0%,7%{opacity:1}8%,72%{opacity:0}73%,100%{opacity:1}}
    @keyframes hallLight{0%,7%{filter:brightness(0)}8%{filter:brightness(.72)}12%{filter:brightness(.18)}14%{filter:brightness(.82)}21%{filter:brightness(.38)}29%{filter:brightness(.78)}37%{filter:brightness(.32)}45%{filter:brightness(.72)}52%{filter:brightness(.24)}58%{filter:brightness(.88)}64%{filter:brightness(.26)}70%{filter:brightness(.55)}72%,100%{filter:brightness(0)}}
    @keyframes fluoroFlicker{0%,8%,14%,29%,45%,58%,70%{opacity:.72}12%,21%,37%,52%,64%{opacity:.12}72%,100%{opacity:0}}
    @keyframes lightStrip{0%,7%{opacity:0}8%,14%,29%,45%,58%,70%{opacity:.78}12%,21%,37%,52%,64%{opacity:.08}72%,100%{opacity:0}}
    @keyframes techMove{0%,15%{opacity:0;transform:translateX(-50%) scale(.16)}16%{opacity:1;transform:translateX(-50%) scale(.20)}40%{opacity:1;transform:translateX(-50%) scale(.55)}58%{opacity:1;transform:translateX(-50%) scale(.98)}66%{opacity:1;transform:translateX(-50%) scale(1.32)}71%{opacity:1;transform:translateX(-50%) scale(2.6)}72%,100%{opacity:0;transform:translateX(-50%) scale(3.2)}}
    @keyframes speed{0%,55%{opacity:0;transform:scale(1)}60%{opacity:.16;transform:scale(1.05)}70%{opacity:.42;transform:scale(1.25)}72%,100%{opacity:0;transform:scale(1.35)}}
    @keyframes captions{0%,8%{opacity:0}9%,16%{opacity:1}17%,25%{opacity:0}26%,36%{opacity:1}37%,48%{opacity:0}49%,59%{opacity:1}60%,67%{opacity:0}68%,72%{opacity:1}73%,100%{opacity:0}}
    @keyframes brand{0%,77%{opacity:0}78%,93%{opacity:1}100%{opacity:0}}
    @keyframes buzzLine{0%,45%,100%{opacity:.9}50%{opacity:.25}52%{opacity:1}56%{opacity:.45}}
    @keyframes identEnd{0%,94%{opacity:1}100%{opacity:0}}

    @media(max-width:700px){.logo-link{width:94vw}.enter{bottom:28px;font-size:11px;letter-spacing:.42em}.hint{display:none}.tech{bottom:18%;}.caption{left:7vw;right:7vw;bottom:8vh;font-size:12px}.brandReveal img{width:92vw}.buzzLine{width:78vw}}
  </style>
</head>
<body>
  <main class="splash" aria-label="Cold Hallway Films landing page">
    <a class="logo-link" href="the-technician.html" aria-label="Enter Cold Hallway Films">
      <img src="assets/coldhallway-logo.jpeg" alt="Cold Hallway Films logo" />
    </a>
    <div class="enter">ENTER</div>
    <div class="hint">click the logo</div>
  </main>

  <section class="ident" aria-hidden="true">
    <div class="hallway">
      <div class="wall left"></div><div class="wall right"></div><div class="ceiling"></div><div class="floor"></div><div class="doors"></div><div class="lights"></div><div class="vanish"></div>
      <div class="tech">
        <div class="head"></div><div class="body"></div><div class="arm l"></div><div class="arm r"></div><div class="leg l"></div><div class="leg r"></div>
        <div class="cart"><div class="wheel l"></div><div class="wheel r"></div></div>
      </div>
      <div class="speedlines"></div>
    </div>
    <div class="blackout"></div>
    <div class="caption" id="captionText">FADE IN:<br>PITCH BLACK.<br>SILENCE.</div>
    <div class="brandReveal"><img src="assets/coldhallway-logo.jpeg" alt="Cold Hallway Films" /><div class="buzzLine"></div></div>
  </section>

  <script>
    const logo = document.querySelector('.logo-link');
    const ident = document.querySelector('.ident');
    const caption = document.getElementById('captionText');
    const captions = [
      {t: 700,  text: 'A DISTANT FLUORESCENT LIGHT<br>FLICKERS TO LIFE.'},
      {t: 1800, text: 'A LONE SILHOUETTE EMERGES.<br>A TECHNICIAN PUSHES A SUPPLY CART.'},
      {t: 3050, text: 'SQUEAK.<br>SQUEAK.<br>SQUEAK.'},
      {t: 4200, text: 'THE CART ROLLS CLOSER.<br>CLOSER.'},
      {t: 5600, text: 'SUDDENLY—<br>THE TECHNICIAN BREAKS INTO A RUN.'},
      {t: 6900, text: 'SMASH CUT TO BLACK.'},
      {t: 7700, text: 'A SINGLE FLUORESCENT BUZZ LINGERS.'}
    ];
    let playing = false;

    logo.addEventListener('click', function(event){
      event.preventDefault();
      if (playing) return;
      playing = true;
      document.body.classList.add('playing');
      ident.setAttribute('aria-hidden', 'false');
      captions.forEach(item => setTimeout(() => { caption.innerHTML = item.text; }, item.t));
      setTimeout(() => { window.location.href = logo.href; }, 8500);
    });
  </script>
</body>
</html>
